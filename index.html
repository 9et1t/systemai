<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NH농협 IT 작업 업무확인 게시판</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Noto+Serif+KR:wght@600;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --g1:#006633;--g2:#008844;--g3:#00aa55;
  --gold:#c8a84b;--gold2:#e8c86e;
  --light:#f0f7f2;--white:#ffffff;
  --gray1:#f5f6f7;--gray2:#e8eaed;--gray3:#c4c8cc;--gray4:#8a9099;
  --text:#1a2530;--text2:#3d4a55;--text3:#6b7a87;
  --red:#cc3300;
  --ss:0 1px 4px rgba(0,102,51,.08);
  --sm:0 4px 16px rgba(0,102,51,.12);
  --sl:0 8px 32px rgba(0,102,51,.16);
  --r:10px;
  --sans:'Noto Sans KR',sans-serif;
  --serif:'Noto Serif KR',serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);background:var(--gray1);color:var(--text);min-height:100vh}
.topband{height:4px;background:linear-gradient(90deg,var(--g1) 0%,var(--gold) 60%,var(--g2) 100%)}
header{background:#fff;border-bottom:2px solid var(--g1);box-shadow:var(--ss);position:sticky;top:0;z-index:200}
.hi{max-width:1100px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;padding:0 1.5rem;height:64px}
.logo{display:flex;align-items:center;gap:14px}
.logo img{height:36px;width:auto;object-fit:contain}
.logo-div{width:1px;height:28px;background:var(--gray2)}
.logo-text strong{display:block;font-size:1rem;font-weight:700;color:var(--g1);letter-spacing:-.02em}
.logo-text span{font-size:.7rem;color:var(--text3)}
.conn-bar{display:flex;align-items:center;gap:10px}
.conn-status{font-size:.72rem;padding:4px 12px;border-radius:20px;border:1px solid;font-weight:600}
.conn-ok{background:#e6f4ec;color:var(--g1);border-color:#99d4b3}
.conn-no{background:#fff8e1;color:#a07000;border-color:#ffe082}
.hero{background:linear-gradient(135deg,var(--g1) 0%,var(--g2) 50%,#005522 100%);color:#fff;padding:2rem 1.5rem;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 70% 60% at 90% 50%,rgba(200,168,75,.15) 0%,transparent 60%)}
.hero-in{max-width:1100px;margin:0 auto;position:relative}
.hero h1{font-family:var(--serif);font-size:1.5rem;font-weight:700;letter-spacing:-.02em;margin-bottom:4px}
.hero h1 span{color:var(--gold2)}
.hero p{font-size:.8rem;opacity:.8;margin-bottom:1.2rem}
.stats-row{display:flex;gap:1rem;flex-wrap:wrap}
.sp{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);border-radius:20px;padding:6px 16px;font-size:.78rem;display:flex;align-items:center;gap:6px}
.sp b{font-size:1rem;font-weight:700}
.main{max-width:1100px;margin:0 auto;padding:1.5rem}
.sl-row{display:flex;align-items:center;gap:10px;margin-bottom:.8rem}
.sl-row h2{font-size:.78rem;font-weight:700;color:var(--g1);text-transform:uppercase;letter-spacing:.1em}
.sl-line{flex:1;height:1px;background:var(--gray2)}
.reg-card{background:#fff;border:1px solid var(--gray2);border-top:3px solid var(--g1);border-radius:var(--r);box-shadow:var(--ss);padding:1.2rem;margin-bottom:1.5rem}
.reg-row{display:grid;grid-template-columns:150px 1fr auto;gap:.75rem;align-items:end}
.fg{display:flex;flex-direction:column;gap:5px}
.fg label{font-size:.7rem;font-weight:700;color:var(--g1);letter-spacing:.05em}
.fg input,.fg select,.fg textarea{border:1px solid var(--gray2);border-radius:6px;padding:.55rem .8rem;font-family:var(--sans);font-size:.85rem;color:var(--text);background:#fff;outline:none;transition:border-color .2s,box-shadow .2s}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--g1);box-shadow:0 0 0 3px rgba(0,102,51,.1)}
.fg textarea{resize:vertical;min-height:60px}
.btn{padding:.55rem 1.2rem;border:none;border-radius:6px;font-family:var(--sans);font-size:.82rem;font-weight:700;cursor:pointer;transition:all .2s;white-space:nowrap}
.btn-p{background:var(--g1);color:#fff}.btn-p:hover{background:var(--g2)}
.btn-gold{background:var(--gold);color:#fff}.btn-gold:hover{background:var(--gold2);color:var(--text)}
.btn-ghost{background:transparent;color:var(--text3);border:1px solid var(--gray3)}.btn-ghost:hover{border-color:var(--g1);color:var(--g1)}
.btn-danger{background:#fdf0ed;color:var(--red);border:1px solid #f5c4b8}.btn-danger:hover{background:#fbe0d9}
.btn-sm{padding:.35rem .75rem;font-size:.72rem}
.btn-xs{padding:.25rem .6rem;font-size:.68rem}
.fbar{display:flex;align-items:center;gap:.5rem;margin-bottom:1rem;flex-wrap:wrap}
.fb{font-size:.75rem;padding:5px 14px;border-radius:20px;border:1px solid var(--gray3);background:#fff;color:var(--text3);cursor:pointer;transition:all .2s;font-family:var(--sans)}
.fb.active{background:var(--g1);color:#fff;border-color:var(--g1)}
.fb:hover:not(.active){border-color:var(--g1);color:var(--g1)}
.sw{margin-left:auto;position:relative}
.sw input{border:1px solid var(--gray3);border-radius:20px;padding:5px 14px 5px 32px;font-family:var(--sans);font-size:.78rem;background:#fff;outline:none;width:200px;transition:border-color .2s}
.sw input:focus{border-color:var(--g1)}
.sw::before{content:'🔍';position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:.72rem}
.board{display:flex;flex-direction:column;gap:.8rem}
.tc{background:#fff;border:1px solid var(--gray2);border-left:4px solid var(--g1);border-radius:var(--r);box-shadow:var(--ss);overflow:hidden;transition:box-shadow .2s;animation:fu .35s ease both}
.tc:hover{box-shadow:var(--sm)}
.tc.done{border-left-color:var(--gold)}
.tc.expanded{border-color:var(--g3);box-shadow:var(--sm)}
.th{padding:1rem 1.2rem;display:flex;align-items:center;gap:.8rem;cursor:pointer;user-select:none}
.th:hover{background:var(--light)}
.tseq{font-size:.68rem;font-weight:700;color:var(--gray4);min-width:32px}
.dtag{font-size:.72rem;font-weight:700;background:var(--light);border:1px solid #c8dfd0;color:var(--g1);border-radius:6px;padding:3px 10px;white-space:nowrap}
.ti{flex:1;min-width:0}
.tname{font-size:.92rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tsub{font-size:.72rem;color:var(--text3);margin-top:2px}
.tact{display:flex;align-items:center;gap:.5rem;flex-shrink:0}
.rbadge{font-size:.7rem;background:#e8f4ee;color:var(--g2);border:1px solid #b3d9c0;border-radius:20px;padding:2px 9px;font-weight:700}
.stag{font-size:.68rem;font-weight:700;padding:3px 10px;border-radius:20px;letter-spacing:.03em}
.s-open{background:#fff8e1;color:#a07000;border:1px solid #ffe082}
.s-closed{background:#e8f4ee;color:var(--g1);border:1px solid #b3d9c0}
.chev{width:16px;height:16px;color:var(--gray4);transition:transform .3s;flex-shrink:0}
.expanded .chev{transform:rotate(180deg)}
.tbody{display:none;border-top:1px solid var(--gray2)}
.tbody.show{display:block}
.tdesc{background:var(--light);border-bottom:1px dashed var(--gray2);padding:.9rem 1.2rem}
.tdesc .lbl{font-size:.68rem;font-weight:700;color:var(--g1);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px}
.tdesc p{font-size:.82rem;color:var(--text2);line-height:1.6}
.rw{padding:1rem 1.2rem}
.rhead{display:flex;align-items:center;gap:8px;margin-bottom:.8rem}
.rhead span{font-size:.72rem;font-weight:700;color:var(--g1);text-transform:uppercase;letter-spacing:.08em}
.rhead small{font-size:.7rem;color:var(--text3)}
.rlist{display:flex;flex-direction:column;gap:.6rem;margin-bottom:1rem}
.ri{background:var(--gray1);border:1px solid var(--gray2);border-radius:8px;padding:.8rem 1rem;display:grid;grid-template-columns:36px 1fr auto;gap:.7rem;align-items:start;animation:fu .25s ease both}
.av{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--g1),var(--g2));display:flex;align-items:center;justify-content:center;font-size:.82rem;font-weight:700;color:#fff;border:2px solid var(--gold);flex-shrink:0}
.rmeta{display:flex;align-items:center;gap:6px;margin-bottom:4px;flex-wrap:wrap}
.rname{font-size:.85rem;font-weight:700}
.rdept{font-size:.66rem;background:#e8f4ee;color:var(--g1);border:1px solid #b3d9c0;border-radius:4px;padding:1px 6px;font-weight:700}
.rduty{font-size:.66rem;background:#fff8e1;color:#a07000;border:1px solid #ffe082;border-radius:4px;padding:1px 6px;font-weight:700}
.rtime{font-size:.65rem;color:var(--text3)}
.rtxt{font-size:.82rem;color:var(--text2);line-height:1.6;white-space:pre-wrap}
.rchk{display:inline-flex;align-items:center;gap:3px;font-size:.66rem;color:var(--g1);font-weight:700;margin-top:4px}
.rctrl{display:flex;flex-direction:column;gap:3px;flex-shrink:0}
.rea{width:100%;border:1px solid var(--g1);border-radius:6px;padding:.5rem;font-family:var(--sans);font-size:.82rem;color:var(--text);background:#fff;outline:none;resize:vertical;min-height:60px;margin-top:4px}
.rebtns{display:flex;gap:4px;margin-top:4px}
.rf{background:linear-gradient(135deg,#f0f7f2,#e8f4ee);border:1px solid #c8dfd0;border-radius:8px;padding:1rem}
.rft{font-size:.75rem;font-weight:700;color:var(--g1);margin-bottom:.7rem;display:flex;align-items:center;gap:6px}
.rft::before{content:'';display:inline-block;width:3px;height:14px;background:var(--gold);border-radius:2px}
.rfg{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.5rem;margin-bottom:.5rem}
.rfb{display:grid;grid-template-columns:1fr auto;gap:.5rem;align-items:end}
.modal-back{display:none;position:fixed;inset:0;background:rgba(0,60,20,.5);backdrop-filter:blur(4px);z-index:400;align-items:center;justify-content:center;padding:1rem}
.modal-back.show{display:flex}
.modal{background:#fff;border-radius:12px;box-shadow:var(--sl);width:100%;max-width:560px;border-top:4px solid var(--g1);animation:fu .3s ease;max-height:90vh;overflow-y:auto}
.mh{padding:1.2rem 1.5rem 1rem;border-bottom:1px solid var(--gray2);display:flex;align-items:center;gap:10px}
.mh h3{font-size:1rem;font-weight:700;flex:1}
.mh .xbtn{background:none;border:none;font-size:1.3rem;color:var(--gray4);cursor:pointer}
.mb{padding:1.2rem 1.5rem}
.mg{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-bottom:.75rem}
.mf{margin-bottom:.75rem}
.mft{padding:1rem 1.5rem;border-top:1px solid var(--gray2);display:flex;justify-content:flex-end;gap:.5rem}
.loading{text-align:center;padding:3rem;color:var(--text3);font-size:.85rem}
.spinner{width:32px;height:32px;border:3px solid var(--gray2);border-top-color:var(--g1);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
.empty{text-align:center;padding:4rem 2rem;color:var(--text3);font-size:.82rem}
.empty-icon{font-size:2.5rem;margin-bottom:10px;opacity:.5}
.toast{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--g1);color:#fff;border-radius:8px;padding:.75rem 1.2rem;font-size:.8rem;font-weight:500;z-index:500;opacity:0;transform:translateY(8px);transition:all .3s;pointer-events:none;box-shadow:var(--sm);max-width:300px}
.toast.err{background:var(--red)}
.toast.show{opacity:1;transform:translateY(0)}
@keyframes fu{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:720px){
  .reg-row{grid-template-columns:1fr}
  .rfg{grid-template-columns:1fr 1fr}
  .mg{grid-template-columns:1fr}
}
</style>
</head>

    <div class="mh"><h3>📋 IT 작업 등록</h3><button class="xbtn" onclick="closeNewModal()">✕</button></div>
    <div class="mb">
      <div class="mg">
        <div class="fg"><label>작업 날짜</label><input type="date" id="mDate"/></div>
        <div class="fg"><label>작업 유형</label>
          <select id="mType">
            <option>서버 작업</option><option>네트워크 작업</option>
            <option>DB 작업</option><option>보안 패치</option>
            <option>시스템 점검</option><option>소프트웨어 배포</option>
            <option>하드웨어 교체</option><option>기타</option>
          </select>
        </div>
      </div>
      <div class="mf fg"><label>작업명</label><input type="text" id="mTitle" placeholder="작업명을 입력하세요"/></div>
      <div class="mf fg"><label>작업 설명 (선택)</label><textarea id="mDesc" placeholder="작업 내용, 영향 범위, 주의사항..."></textarea></div>
      <div class="mg">
        <div class="fg"><label>시작 시간</label><input type="time" id="mSt"/></div>
        <div class="fg"><label>종료 시간</label><input type="time" id="mEt"/></div>
      </div>
      <div class="mf fg"><label>등록자</label><input type="text" id="mAuthor" placeholder="등록자 이름"/></div>
    </div>
    <div class="mft">
      <button class="btn btn-ghost" onclick="closeNewModal()">취소</button>
      <button class="btn btn-p" onclick="submitTask()">등록</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const WORKER = 'https://systemai.hyunwook565.workers.dev';
const OWNER  = '9et1t';
const REPO   = 'systemai';

let allIssues = [];
let filter = 'all';
let search = '';

async function api(method, path, body){
  const opts = {
    method,
    headers: { 'Content-Type': 'application/json' }
  };

  if(body) opts.body = JSON.stringify(body);

  const r = await fetch(WORKER + path, opts);

  if(r.status === 204) return true;

  const text = await r.text();

  let data = null;
  try {
    data = text ? JSON.parse(text) : null;
  } catch {
    throw new Error('응답 파싱 실패: ' + text);
  }

  if(!r.ok) {
    throw new Error(
      (data && data.message)
        ? `${r.status} ${data.message}`
        : `${r.status} ${r.statusText}`
    );
  }

  return data;
}

function parseMeta(body, tag){
  const m = (body || '').match(new RegExp('<!--' + tag + ':(.*?)-->','s'));
  if(m){
    try { return JSON.parse(m[1]); } catch(e){}
  }
  return {};
}

function issueToTask(i){
  const m = parseMeta(i.body,'NH');
  return {
    id:i.number,
    title:i.title,
    status:i.state,
    date:m.date || '',
    type:m.type || '',
    desc:m.desc || '',
    st:m.st || '',
    et:m.et || '',
    author:m.author || '',
    createdAt:i.created_at,
    _replies:[],
    _loaded:false,
    _expanded:false
  };
}

function commentToReply(c){
  const m = parseMeta(c.body,'RP');
  const txt = (c.body || '').replace(/<!--RP:.*?-->/s,'').trim();
  return {
    id:c.id,
    dept:m.dept || '',
    name:m.name || '',
    duty:m.duty || '',
    content:txt,
    createdAt:c.created_at,
    updatedAt:c.updated_at
  };
}

async function loadBoard(){
  const el = document.getElementById('board');
  el.innerHTML = '<div class="loading"><div class="spinner"></div>작업 목록 불러오는 중...</div>';
  try{
    const issues = await api('GET', '/repos/' + OWNER + '/' + REPO + '/issues?state=all&per_page=100');
    allIssues = issues.filter(i => !i.pull_request).map(issueToTask);
    renderBoard();
    updateStats();
    setStatus(true);
  }catch(e){
    setStatus(false);
    el.innerHTML = '<div class="empty"><div class="empty-icon">⚠</div><p>불러오기 실패: ' + esc(e.message) + '</p></div>';
  }
}

function renderBoard(){
  let list = [...allIssues].sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));
  if(filter === 'open') list = list.filter(t => t.status === 'open');
  if(filter === 'closed') list = list.filter(t => t.status === 'closed');
  if(search) list = list.filter(t => t.title.includes(search) || (t.type || '').includes(search));

  const el = document.getElementById('board');
  if(!list.length){
    el.innerHTML = '<div class="empty"><div class="empty-icon">📭</div><p>등록된 작업이 없습니다.</p></div>';
    return;
  }

  el.innerHTML = list.map((t,i)=>cardHTML(t, i+1)).join('');
}

function cardHTML(t,n){
  const exp = t._expanded;
  const ds = t.date ? fmtDate(t.date) : '날짜미정';
  const sl = t.status === 'open' ? '진행중' : '완료';
  const sc = t.status === 'open' ? 's-open' : 's-closed';

  return `
<div class="tc ${t.status === 'closed' ? 'done' : ''} ${exp ? 'expanded' : ''}" id="tc_${t.id}">
  <div class="th" onclick="toggle(${t.id})">
    <span class="tseq">#${String(n).padStart(3,'0')}</span>
    <span class="dtag">📅 ${ds}</span>
    <div class="ti">
      <div class="tname">${esc(t.title)}</div>
      <div class="tsub">${esc(t.type)} ${t.st ? '· ' + t.st + (t.et ? ' ~ ' + t.et : '') : ''} ${t.author ? '· 등록: ' + esc(t.author) : ''}</div>
    </div>
    <div class="tact">
      <span class="rbadge" id="rc_${t.id}">💬 ${t._replies.length}</span>
      <span class="stag ${sc}">${sl}</span>
      ${t.status === 'open'
        ? `<button class="btn btn-gold btn-sm" onclick="event.stopPropagation();closeTask(${t.id})">✓ 완료</button>`
        : `<button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();reopenTask(${t.id})">↺ 재개</button>`}
      <svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6,9 12,15 18,9"/></svg>
    </div>
  </div>
  <div class="tbody ${exp ? 'show' : ''}" id="tb_${t.id}">
    ${t.desc ? `<div class="tdesc"><div class="lbl">작업 설명</div><p>${esc(t.desc).replace(/\n/g,'<br>')}</p></div>` : ''}
    <div class="rw">
      <div class="rhead"><span>업무확인 응답</span><small id="rcount_${t.id}">${t._replies.length}건</small></div>
      <div class="rlist" id="rl_${t.id}">
        ${t._replies.length ? t._replies.map(r=>replyHTML(r,t.id)).join('') : '<div style="font-size:.78rem;color:var(--text3);padding:.4rem 0">아직 업무확인 응답이 없습니다.</div>'}
      </div>
      <div class="rf">
        <div class="rft">업무확인 응답 작성</div>
        <div class="rfg">
          <div class="fg"><label>소속 부서</label><input type="text" id="fd_${t.id}" placeholder="인프라팀"/></div>
          <div class="fg"><label>이름</label><input type="text" id="fn_${t.id}" placeholder="홍길동"/></div>
          <div class="fg"><label>담당 업무</label><input type="text" id="fu_${t.id}" placeholder="서버 담당"/></div>
        </div>
        <div class="rfb">
          <div class="fg"><label>확인 내용</label><textarea id="fc_${t.id}" placeholder="담당 업무 확인 내용을 입력하세요..."></textarea></div>
          <button class="btn btn-p" onclick="submitReply(${t.id})">확인 등록</button>
        </div>
      </div>
    </div>
  </div>
</div>`;
}

function replyHTML(r,tid){
  const init = r.name ? r.name.charAt(0) : '?';
  const edited = r.updatedAt && r.updatedAt !== r.createdAt ? ' (수정됨)' : '';
  return `
<div class="ri" id="ri_${r.id}">
  <div class="av">${esc(init)}</div>
  <div>
    <div class="rmeta">
      <span class="rname">${esc(r.name)}</span>
      <span class="rdept">${esc(r.dept)}</span>
      <span class="rduty">${esc(r.duty)}</span>
      <span class="rtime">${fmtDt(r.createdAt)}${edited}</span>
    </div>
    <div class="rtxt" id="rt_${r.id}">${esc(r.content).replace(/\n/g,'<br>')}</div>
    <div class="rchk">✅ 업무확인 완료</div>
    <div id="re_${r.id}" style="display:none">
      <textarea class="rea" id="retxt_${r.id}">${esc(r.content)}</textarea>
      <div class="rebtns">
        <button class="btn btn-p btn-xs" onclick="saveEdit(${tid},${r.id})">저장</button>
        <button class="btn btn-ghost btn-xs" onclick="cancelEdit(${r.id})">취소</button>
      </div>
    </div>
  </div>
  <div class="rctrl">
    <button class="btn btn-ghost btn-xs" onclick="startEdit(${r.id})">✏</button>
    <button class="btn btn-danger btn-xs" onclick="delReply(${tid},${r.id})">✕</button>
  </div>
</div>`;
}

async function toggle(id){
  const t = allIssues.find(t=>t.id===id);
  if(!t) return;

  t._expanded = !t._expanded;

  const card = document.getElementById('tc_' + id);
  const body = document.getElementById('tb_' + id);

  if(t._expanded){
    card.classList.add('expanded');
    body.classList.add('show');
    if(!t._loaded) await loadReplies(t);
  }else{
    card.classList.remove('expanded');
    body.classList.remove('show');
  }
}

async function loadReplies(t){
  const el = document.getElementById('rl_' + t.id);
  el.innerHTML = '<div style="font-size:.78rem;color:var(--text3)">댓글 불러오는 중...</div>';
  try{
    const cs = await api('GET', '/repos/' + OWNER + '/' + REPO + '/issues/' + t.id + '/comments');
    t._replies = cs.map(commentToReply);
    t._loaded = true;
    refreshReplies(t);
    updateStats();
  }catch(e){
    el.innerHTML = '<div style="font-size:.78rem;color:var(--red)">로드 실패: ' + esc(e.message) + '</div>';
  }
}

function refreshReplies(t){
  const el = document.getElementById('rl_' + t.id);
  const rc = document.getElementById('rc_' + t.id);
  const rcount = document.getElementById('rcount_' + t.id);

  if(el){
    el.innerHTML = t._replies.length
      ? t._replies.map(r=>replyHTML(r,t.id)).join('')
      : '<div style="font-size:.78rem;color:var(--text3);padding:.4rem 0">아직 업무확인 응답이 없습니다.</div>';
  }

  if(rc) rc.textContent = '💬 ' + t._replies.length;
  if(rcount) rcount.textContent = t._replies.length + '건';
}

function openNewModal(){
  const dv = document.getElementById('qDate').value;
  const tv = document.getElementById('qTitle').value;
  if(dv) document.getElementById('mDate').value = dv;
  if(tv) document.getElementById('mTitle').value = tv;
  document.getElementById('newModal').classList.add('show');
}

function closeNewModal(){
  document.getElementById('newModal').classList.remove('show');
}

document.getElementById('newModal').addEventListener('click', e => {
  if(e.target === e.currentTarget) closeNewModal();
});

async function submitTask(){
  const date = v('mDate');
  const title = v('mTitle').trim();
  const type = v('mType');
  const desc = v('mDesc').trim();
  const st = v('mSt');
  const et = v('mEt');
  const author = v('mAuthor').trim();

  if(!date || !title){
    toast('날짜와 작업명은 필수입니다.','err');
    return;
  }

  const btn = document.querySelector('#newModal .btn-p');
  btn.textContent = '등록중...';
  btn.disabled = true;

  try{
    const meta = { date, type, desc, st, et, author };
    const body = '<!--NH:' + JSON.stringify(meta) + '-->\n\n' + desc;
    const issue = await api('POST', '/repos/' + OWNER + '/' + REPO + '/issues', { title, body });
    const task = issueToTask(issue);
    task._replies = [];
    task._loaded = true;
    allIssues.unshift(task);
    renderBoard();
    updateStats();

    ['mDate','mTitle','mDesc','mSt','mEt','mAuthor'].forEach(id=>{
      const e = document.getElementById(id);
      if(e) e.value = '';
    });

    document.getElementById('qTitle').value = '';
    closeNewModal();
    toast('✓ 작업이 등록되었습니다.');
  }catch(e){
    toast('등록 실패: ' + e.message, 'err');
  }finally{
    btn.textContent = '등록';
    btn.disabled = false;
  }
}

async function closeTask(id){
  if(!confirm('작업을 완료 처리하시겠습니까?')) return;
  try{
    await api('PATCH', '/repos/' + OWNER + '/' + REPO + '/issues/' + id, { state:'closed' });
    const t = allIssues.find(t=>t.id===id);
    if(t) t.status = 'closed';
    renderBoard();
    updateStats();
    toast('✓ 완료 처리되었습니다.');
  }catch(e){
    toast('오류: ' + e.message, 'err');
  }
}

async function reopenTask(id){
  try{
    await api('PATCH', '/repos/' + OWNER + '/' + REPO + '/issues/' + id, { state:'open' });
    const t = allIssues.find(t=>t.id===id);
    if(t) t.status = 'open';
    renderBoard();
    updateStats();
    toast('✓ 재개 처리되었습니다.');
  }catch(e){
    toast('오류: ' + e.message, 'err');
  }
}

async function submitReply(tid){
  const dept = v('fd_' + tid).trim();
  const name = v('fn_' + tid).trim();
  const duty = v('fu_' + tid).trim();
  const content = v('fc_' + tid).trim();

  if(!dept || !name || !duty || !content){
    toast('모든 항목을 입력해주세요.','err');
    return;
  }

  const btn = document.querySelector(`#tc_${tid} .rf .btn-p`);
  if(btn){
    btn.textContent = '등록중...';
    btn.disabled = true;
  }

  try{
    const body = '<!--RP:' + JSON.stringify({ dept, name, duty }) + '-->\n' + content;
    const c = await api('POST', '/repos/' + OWNER + '/' + REPO + '/issues/' + tid + '/comments', { body });
    const t = allIssues.find(t=>t.id===tid);
    if(t){
      t._replies.push(commentToReply(c));
      refreshReplies(t);
    }
    ['fd_','fn_','fu_','fc_'].forEach(p=>{
      const e = document.getElementById(p + tid);
      if(e) e.value = '';
    });
    updateStats();
    toast('✓ 업무확인 응답이 등록되었습니다.');
  }catch(e){
    toast('등록 실패: ' + e.message, 'err');
  }finally{
    if(btn){
      btn.textContent = '확인 등록';
      btn.disabled = false;
    }
  }
}

function startEdit(rid){
  const t = allIssues.find(t => t._replies && t._replies.find(r => r.id === rid));
  if(t){
    const r = t._replies.find(r => r.id === rid);
    if(r) document.getElementById('retxt_' + rid).value = r.content;
  }
  document.getElementById('rt_' + rid).style.display = 'none';
  document.getElementById('re_' + rid).style.display = 'block';
}

function cancelEdit(rid){
  document.getElementById('rt_' + rid).style.display = '';
  document.getElementById('re_' + rid).style.display = 'none';
}

async function saveEdit(tid,rid){
  const content = document.getElementById('retxt_' + rid).value.trim();
  if(!content){
    toast('내용을 입력해주세요.','err');
    return;
  }

  const t = allIssues.find(t => t.id === tid);
  if(!t) return;

  const r = t._replies.find(r => r.id === rid);
  if(!r) return;

  try{
    const body = '<!--RP:' + JSON.stringify({ dept:r.dept, name:r.name, duty:r.duty }) + '-->\n' + content;
    const updated = await api('PATCH', '/repos/' + OWNER + '/' + REPO + '/issues/comments/' + rid, { body });
    const idx = t._replies.findIndex(rr => rr.id === rid);
    if(idx !== -1) t._replies[idx] = commentToReply(updated);
    refreshReplies(t);
    toast('✓ 응답이 수정되었습니다.');
  }catch(e){
    toast('수정 실패: ' + e.message, 'err');
  }
}

async function delReply(tid,rid){
  if(!confirm('이 응답을 삭제하시겠습니까?')) return;
  try{
    await api('DELETE', '/repos/' + OWNER + '/' + REPO + '/issues/comments/' + rid);
    const t = allIssues.find(t => t.id === tid);
    if(t){
      t._replies = t._replies.filter(r => r.id !== rid);
      refreshReplies(t);
    }
    updateStats();
    toast('✓ 응답이 삭제되었습니다.');
  }catch(e){
    toast('삭제 실패: ' + e.message, 'err');
  }
}

function setFilter(f,el){
  filter = f;
  document.querySelectorAll('.fb').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  renderBoard();
}

function doSearch(val){
  search = val;
  renderBoard();
}

function updateStats(){
  document.getElementById('sTotal').textContent = allIssues.length;
  document.getElementById('sOngoing').textContent = allIssues.filter(t=>t.status==='open').length;
  document.getElementById('sDone').textContent = allIssues.filter(t=>t.status==='closed').length;
  document.getElementById('sReplies').textContent = allIssues.reduce((s,t)=>s+(t._replies||[]).length,0);
}

function setStatus(ok){
  const el = document.getElementById('connStatus');
  if(ok){
    el.className = 'conn-status conn-ok';
    el.textContent = '● 연결됨';
  }else{
    el.className = 'conn-status conn-no';
    el.textContent = '● 미연결';
  }
}

function v(id){
  const e = document.getElementById(id);
  return e ? e.value : '';
}

function esc(s){
  if(!s) return '';
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

function fmtDate(d){
  if(!d) return '';
  const dt = new Date(d + 'T00:00:00');
  return dt.toLocaleDateString('ko-KR',{
    year:'numeric',
    month:'2-digit',
    day:'2-digit',
    weekday:'short'
  });
}

function fmtDt(iso){
  if(!iso) return '';
  const d = new Date(iso);
  return d.toLocaleString('ko-KR',{
    month:'2-digit',
    day:'2-digit',
    hour:'2-digit',
    minute:'2-digit'
  });
}

function toast(msg,type=''){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (type ? ' ' + type : '');
  t.classList.add('show');
  clearTimeout(t._t);
  t._t = setTimeout(()=>t.classList.remove('show'), 2800);
}

document.addEventListener('DOMContentLoaded', ()=>{
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('qDate').value = today;
  document.getElementById('mDate').value = today;
  loadBoard();
});
</script>
</body>
</html>
