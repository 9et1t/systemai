<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NH농협 IT 작업 업무확인 게시판</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Noto+Serif+KR:wght@600;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --g1:#006633;--g2:#008844;--g3:#00aa55;
  --gold:#c8a84b;--gold2:#e8c86e;
  --light:#f0f7f2;--white:#ffffff;
  --gray1:#f5f6f7;--gray2:#e8eaed;--gray3:#c4c8cc;--gray4:#8a9099;
  --text:#1a2530;--text2:#3d4a55;--text3:#6b7a87;
  --red:#cc3300;
  --ss:0 1px 4px rgba(0,102,51,.08);
  --sm:0 4px 16px rgba(0,102,51,.12);
  --sl:0 8px 32px rgba(0,102,51,.16);
  --r:10px;
  --sans:'Noto Sans KR',sans-serif;
  --serif:'Noto Serif KR',serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);background:var(--gray1);color:var(--text);min-height:100vh}
.topband{height:4px;background:linear-gradient(90deg,var(--g1) 0%,var(--gold) 60%,var(--g2) 100%)}
header{background:#fff;border-bottom:2px solid var(--g1);box-shadow:var(--ss);position:sticky;top:0;z-index:200}
.hi{max-width:1100px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;padding:0 1.5rem;height:64px}
.logo{display:flex;align-items:center;gap:14px}
.logo img{height:36px;width:auto;object-fit:contain}
.logo-div{width:1px;height:28px;background:var(--gray2)}
.logo-text strong{display:block;font-size:1rem;font-weight:700;color:var(--g1);letter-spacing:-.02em}
.logo-text span{font-size:.7rem;color:var(--text3)}
.conn-bar{display:flex;align-items:center;gap:10px}
.conn-status{font-size:.72rem;padding:4px 12px;border-radius:20px;border:1px solid;font-weight:600}
.conn-ok{background:#e6f4ec;color:var(--g1);border-color:#99d4b3}
.conn-no{background:#fff8e1;color:#a07000;border-color:#ffe082}
.hero{background:linear-gradient(135deg,var(--g1) 0%,var(--g2) 50%,#005522 100%);color:#fff;padding:2rem 1.5rem;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 70% 60% at 90% 50%,rgba(200,168,75,.15) 0%,transparent 60%)}
.hero-in{max-width:1100px;margin:0 auto;position:relative}
.hero h1{font-family:var(--serif);font-size:1.5rem;font-weight:700;letter-spacing:-.02em;margin-bottom:4px}
.hero h1 span{color:var(--gold2)}
.hero p{font-size:.8rem;opacity:.8;margin-bottom:1.2rem}
.stats-row{display:flex;gap:1rem;flex-wrap:wrap}
.sp{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);border-radius:20px;padding:6px 16px;font-size:.78rem;display:flex;align-items:center;gap:6px}
.sp b{font-size:1rem;font-weight:700}
.main{max-width:1100px;margin:0 auto;padding:1.5rem}
.sl-row{display:flex;align-items:center;gap:10px;margin-bottom:.8rem}
.sl-row h2{font-size:.78rem;font-weight:700;color:var(--g1);text-transform:uppercase;letter-spacing:.1em}
.sl-line{flex:1;height:1px;background:var(--gray2)}
.reg-card{background:#fff;border:1px solid var(--gray2);border-top:3px solid var(--g1);border-radius:var(--r);box-shadow:var(--ss);padding:1.2rem;margin-bottom:1.5rem}
.reg-row{display:grid;grid-template-columns:150px 1fr auto;gap:.75rem;align-items:end}
.fg{display:flex;flex-direction:column;gap:5px}
.fg label{font-size:.7rem;font-weight:700;color:var(--g1);letter-spacing:.05em}
.fg input,.fg select,.fg textarea{border:1px solid var(--gray2);border-radius:6px;padding:.55rem .8rem;font-family:var(--sans);font-size:.85rem;color:var(--text);background:#fff;outline:none;transition:border-color .2s,box-shadow .2s}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--g1);box-shadow:0 0 0 3px rgba(0,102,51,.1)}
.fg textarea{resize:vertical;min-height:60px}
.btn{padding:.55rem 1.2rem;border:none;border-radius:6px;font-family:var(--sans);font-size:.82rem;font-weight:700;cursor:pointer;transition:all .2s;white-space:nowrap}
.btn-p{background:var(--g1);color:#fff}.btn-p:hover{background:var(--g2)}
.btn-gold{background:var(--gold);color:#fff}.btn-gold:hover{background:var(--gold2);color:var(--text)}
.btn-ghost{background:transparent;color:var(--text3);border:1px solid var(--gray3)}.btn-ghost:hover{border-color:var(--g1);color:var(--g1)}
.btn-danger{background:#fdf0ed;color:var(--red);border:1px solid #f5c4b8}.btn-danger:hover{background:#fbe0d9}
.btn-sm{padding:.35rem .75rem;font-size:.72rem}
.btn-xs{padding:.25rem .6rem;font-size:.68rem}
.fbar{display:flex;align-items:center;gap:.5rem;margin-bottom:1rem;flex-wrap:wrap}
.fb{font-size:.75rem;padding:5px 14px;border-radius:20px;border:1px solid var(--gray3);background:#fff;color:var(--text3);cursor:pointer;transition:all .2s;font-family:var(--sans)}
.fb.active{background:var(--g1);color:#fff;border-color:var(--g1)}
.fb:hover:not(.active){border-color:var(--g1);color:var(--g1)}
.sw{margin-left:auto;position:relative}
.sw input{border:1px solid var(--gray3);border-radius:20px;padding:5px 14px 5px 32px;font-family:var(--sans);font-size:.78
