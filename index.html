<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>NEIS API 서비스명 탐색</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0e0e0e;color:#f0ece4;font-family:'Noto Sans KR',sans-serif;padding:24px;font-size:13px}
h2{color:#c8a96e;font-size:14px;margin-bottom:12px;font-family:monospace;letter-spacing:.1em}
.section{background:#161616;border:1px solid #2a2a2a;padding:20px;margin-bottom:14px}
.row{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;align-items:center}
label{color:#8a8580;font-size:11px;min-width:90px}
input,select{background:#1e1e1e;border:1px solid #2a2a2a;color:#f0ece4;padding:7px 10px;font-size:12px;font-family:monospace;outline:none}
input:focus{border-color:#c8a96e}
button{background:#c8a96e;color:#0e0e0e;border:none;padding:8px 16px;font-size:12px;font-weight:700;cursor:pointer;margin-right:6px;margin-bottom:4px}
button.sec{background:#1e1e1e;border:1px solid #383838;color:#8a8580;font-weight:400}
button.sec:hover{border-color:#c8a96e;color:#c8a96e}
pre{background:#0a0a0a;border:1px solid #1e1e1e;padding:14px;font-family:monospace;font-size:11px;overflow:auto;max-height:360px;white-space:pre-wrap;word-break:break-all;margin-top:10px;color:#7fb5a0;line-height:1.6}
.badge{display:inline-block;font-size:10px;padding:2px 8px;font-family:monospace;margin:2px;border-radius:1px}
.ok{background:rgba(127,181,160,.15);border:1px solid rgba(127,181,160,.4);color:#7fb5a0}
.err{background:rgba(212,117,110,.15);border:1px solid rgba(212,117,110,.4);color:#d4756e}
.warn{background:rgba(200,169,110,.15);border:1px solid rgba(200,169,110,.4);color:#c8a96e}
.info{background:rgba(125,168,224,.15);border:1px solid rgba(125,168,224,.4);color:#7da8e0}
.kv{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #1e1e1e;font-size:12px}
.kv span:first-child{color:#8a8580;flex-shrink:0}
.kv span:last-child{font-family:monospace;color:#f0ece4;text-align:right;word-break:break-all;margin-left:8px}
.box{background:#0e0e0e;border:1px solid #2a2a2a;padding:14px;margin-top:10px}
.svc-row{display:flex;align-items:center;gap:10px;padding:8px;border:1px solid #1e1e1e;margin-bottom:6px;cursor:pointer}
.svc-row:hover{border-color:#383838}
.svc-name{font-family:monospace;font-size:12px;min-width:260px}
.svc-badge{min-width:80px;text-align:center}
.svc-detail{font-size:11px;color:#8a8580;flex:1}
</style>
</head>
<body>

<div style="margin-bottom:20px">
  <div style="font-family:monospace;font-size:10px;color:#c8a96e;letter-spacing:.3em">NEIS API 서비스명 탐색 도구</div>
  <div style="color:#4a4642;font-size:11px;margin-top:4px">ERROR-310 해결 — 올바른 서비스명을 찾습니다</div>
</div>

<!-- ① 서비스명 자동 탐색 -->
<div class="section">
  <h2>① 진로현황 API 서비스명 자동 탐색</h2>
  <p style="font-size:11px;color:#8a8580;margin-bottom:12px">후보 서비스명 15개를 순차 호출해서 ERROR-310이 아닌 응답을 찾습니다</p>
  <div class="row">
    <label>시도코드</label>
    <select id="atpt2" style="width:160px">
      <option value="B10">B10 — 서울</option>
      <option value="J10">J10 — 경기</option>
      <option value="C10">C10 — 부산</option>
    </select>
    <label>학교코드</label>
    <input id="schul_code" value="7010155" style="width:120px" placeholder="SD_SCHUL_CODE">
    <label>연도</label>
    <input id="ay" value="2023" style="width:70px">
  </div>
  <div class="row">
    <button onclick="scanServices()">▶ 서비스명 전체 탐색 실행</button>
    <span style="font-size:11px;color:#4a4642">학교코드는 아래 ③에서 찾을 수 있어요</span>
  </div>
  <div id="scan_result"></div>
</div>

<!-- ② 찾은 서비스명으로 직접 조회 -->
<div class="section">
  <h2>② 서비스명 직접 테스트</h2>
  <div class="row">
    <label>서비스명</label>
    <input id="svc_name" value="stuCrslCrsTrnsInfo" style="width:260px">
    <label>시도코드</label>
    <input id="svc_atpt" value="B10" style="width:60px">
  </div>
  <div class="row">
    <label>학교코드</label>
    <input id="svc_code" value="7010155" style="width:120px">
    <label>연도</label>
    <input id="svc_yr" value="2023" style="width:70px">
  </div>
  <div class="row">
    <button onclick="testSvc()">▶ 직접 조회</button>
    <button class="sec" onclick="testSvc('gradStuCrslCrsTrnsInfo')">gradStuCrslCrsTrnsInfo</button>
    <button class="sec" onclick="testSvc('schlCrsTrnsInfo')">schlCrsTrnsInfo</button>
    <button class="sec" onclick="testSvc('stuCrslInfo')">stuCrslInfo</button>
  </div>
  <div id="svc_result"></div>
  <pre id="svc_raw" style="display:none"></pre>
  <button class="sec" style="margin-top:8px;font-size:10px" onclick="tog('svc_raw')">RAW 토글</button>
</div>

<!-- ③ 카카오로 학교 검색 → 코드 확인 -->
<div class="section">
  <h2>③ 카카오 중학교 검색 → NEIS 학교코드 확인</h2>
  <div class="row">
    <label>위도</label><input id="kk_lat" value="37.4979" style="width:110px">
    <label>경도</label><input id="kk_lng" value="127.0277" style="width:110px">
    <label>반경(m)</label><input id="kk_r" value="1500" style="width:70px">
  </div>
  <div class="row">
    <button onclick="searchSchools()">▶ 중학교 검색</button>
    <button class="sec" onclick="kpreset(37.4979,127.0277)">강남구</button>
    <button class="sec" onclick="kpreset(37.6542,127.0568)">노원구</button>
    <button class="sec" onclick="kpreset(37.5145,127.1066)">송파구</button>
    <button class="sec" onclick="kpreset(37.5472,127.037)">성동구</button>
  </div>
  <div id="school_list"></div>
</div>

<!-- ④ NEIS schoolInfo로 학교코드 검색 -->
<div class="section">
  <h2>④ NEIS schoolInfo — 학교명으로 코드 검색</h2>
  <div class="row">
    <label>시도코드</label>
    <select id="si_atpt" style="width:160px">
      <option value="B10">B10 — 서울</option>
      <option value="J10">J10 — 경기</option>
      <option value="C10">C10 — 부산</option>
      <option value="E10">E10 — 인천</option>
      <option value="G10">G10 — 대전</option>
    </select>
    <label>학교명</label>
    <input id="si_name" value="대치중" style="width:160px" placeholder="예: 대치중학교">
  </div>
  <div class="row">
    <button onclick="searchNeisSchool()">▶ 학교 코드 검색</button>
  </div>
  <div id="neis_school_result"></div>
</div>

<script>
const NEIS_KEY = '5507af1843bf4b13a0db197dd1033cbe';
const KAKAO_KEY = 'KakaoAK 9642e6e4e92954d552e94eb32af57a8b';

function tog(id){ const el=document.getElementById(id); el.style.display=el.style.display==='none'?'block':'none'; }
function kpreset(lat,lng){ document.getElementById('kk_lat').value=lat; document.getElementById('kk_lng').value=lng; }

// ① 서비스명 전체 탐색
const CANDIDATES = [
  'stuCrslCrsTrnsInfo',
  'gradStuCrslCrsTrnsInfo',
  'schlCrsTrnsInfo',
  'stuCrslInfo',
  'graduationStuInfo',
  'schlGradCrsTrnsInfo',
  'stuGradCrsTrnsInfo',
  'MisDtaInfo',
  'spClassCrseInfo',
  'schlCrslCrsTrnsInfo',
  'crsTrnsInfo',
  'stuGradInfo',
  'graduationCrsTrnsInfo',
  'scrlCrsTrnsInfo',
  'stuCrsTrnsInfo',
];

async function scanServices(){
  const atpt = document.getElementById('atpt2').value;
  const code = document.getElementById('schul_code').value;
  const ay   = document.getElementById('ay').value;
  const el   = document.getElementById('scan_result');
  el.innerHTML = `<div style="color:#c8a96e;font-size:11px;margin-bottom:10px">🔍 ${CANDIDATES.length}개 서비스명 탐색 중...</div>`;

  const rows = [];
  for(const svc of CANDIDATES){
    try{
      const r = await fetch(
        `https://open.neis.go.kr/hub/${svc}?KEY=${NEIS_KEY}&Type=json&pSize=1` +
        `&ATPT_OFCDC_SC_CODE=${atpt}&SD_SCHUL_CODE=${code}&AY=${ay}`
      );
      const d = await r.json();
      const isErr310 = d?.RESULT?.CODE === 'ERROR-310';
      const isErr = d?.RESULT?.CODE;
      const hasData = !isErr && (d?.[svc]?.[1]?.row?.length > 0 || d?.[Object.keys(d)[0]]?.[1]?.row?.length > 0);
      const code2 = d?.RESULT?.CODE || '응답 있음';
      const msg   = d?.RESULT?.MESSAGE || (hasData ? '데이터 있음!' : '데이터 없음(빈 결과)');
      rows.push({ svc, isErr310, isErr, hasData, code2, msg, raw: JSON.stringify(d) });

      // 실시간 업데이트
      el.innerHTML = rows.map(row=>`
        <div class="svc-row" onclick="fillSvc('${row.svc}')">
          <span class="svc-name">${row.svc}</span>
          <span class="svc-badge">
            ${row.hasData ? '<span class="badge ok">✓ 데이터!</span>'
              : row.isErr310 ? '<span class="badge err">ERROR-310</span>'
              : row.isErr ? `<span class="badge warn">${row.code2}</span>`
              : '<span class="badge info">빈 결과</span>'}
          </span>
          <span class="svc-detail">${row.msg}</span>
        </div>
      `).join('') + (rows.length < CANDIDATES.length ? `<div style="color:#4a4642;font-size:11px;margin-top:6px">탐색 중... ${rows.length}/${CANDIDATES.length}</div>` : '');
    }catch(e){
      rows.push({svc, isErr310:false, isErr:true, hasData:false, code2:'fetch오류', msg:e.message, raw:''});
    }
    await new Promise(r=>setTimeout(r,150)); // 과부하 방지
  }

  const found = rows.filter(r=>r.hasData||(!r.isErr310&&!r.isErr));
  el.innerHTML += found.length
    ? `<div style="margin-top:12px;padding:10px;background:rgba(127,181,160,.1);border:1px solid rgba(127,181,160,.3);color:#7fb5a0;font-family:monospace;font-size:12px">✓ 유효 서비스명: ${found.map(r=>r.svc).join(', ')}</div>`
    : `<div style="margin-top:12px;padding:10px;background:rgba(212,117,110,.1);border:1px solid rgba(212,117,110,.3);color:#d4756e;font-size:12px">❌ 모든 서비스명이 오류 — 학교코드 또는 시도코드 확인 필요</div>`;
}

function fillSvc(name){
  document.getElementById('svc_name').value=name;
  testSvc(name);
}

// ② 직접 테스트
async function testSvc(nameOverride){
  const svc  = nameOverride || document.getElementById('svc_name').value.trim();
  const atpt = document.getElementById('svc_atpt').value.trim();
  const code = document.getElementById('svc_code').value.trim();
  const yr   = document.getElementById('svc_yr').value.trim();
  const re   = document.getElementById('svc_result');
  const ra   = document.getElementById('svc_raw');
  re.innerHTML = '<span class="badge warn">조회 중...</span>';
  try{
    const r = await fetch(
      `https://open.neis.go.kr/hub/${svc}?KEY=${NEIS_KEY}&Type=json&pSize=5` +
      `&ATPT_OFCDC_SC_CODE=${atpt}&SD_SCHUL_CODE=${code}&AY=${yr}`
    );
    const d = await r.json();
    ra.textContent = JSON.stringify(d, null, 2);
    if(d?.RESULT?.CODE){
      re.innerHTML=`<span class="badge err">${d.RESULT.CODE}</span> ${d.RESULT.MESSAGE}`;
      return;
    }
    // 데이터 키 자동 탐색
    const dataKey = Object.keys(d).find(k=>Array.isArray(d[k]));
    const rows = dataKey ? (d[dataKey][1]?.row || []) : [];
    if(!rows.length){
      re.innerHTML=`<span class="badge warn">응답 성공이지만 데이터 없음</span> 연도(${yr})를 바꿔보세요<br><span style="font-size:11px;color:#4a4642">응답 키: ${Object.keys(d).join(', ')}</span>`;
      return;
    }
    // 첫 row의 모든 필드 표시
    re.innerHTML=`<span class="badge ok">데이터 있음! ${rows.length}행</span>
      <div class="box">${Object.entries(rows[0]).map(([k,v])=>`<div class="kv"><span>${k}</span><span>${v||'—'}</span></div>`).join('')}</div>`;
  }catch(e){
    re.innerHTML=`<span class="badge err">오류: ${e.message}</span>`;
  }
}

// ③ 카카오 중학교 검색
async function searchSchools(){
  const lat=document.getElementById('kk_lat').value;
  const lng=document.getElementById('kk_lng').value;
  const radius=document.getElementById('kk_r').value;
  const el=document.getElementById('school_list');
  el.innerHTML='<span class="badge warn">검색 중...</span>';
  try{
    const r=await fetch(
      `https://dapi.kakao.com/v2/local/search/keyword.json?query=${encodeURIComponent('중학교')}&x=${lng}&y=${lat}&radius=${radius}&size=15&sort=distance`,
      {headers:{Authorization:KAKAO_KEY}}
    );
    const d=await r.json();
    const schools=(d.documents||[]).filter(s=>s.category_name&&(s.category_name.includes('학교')||s.place_name.includes('중학교')));
    if(!schools.length){ el.innerHTML='<span class="badge warn">검색 결과 없음</span>'; return; }
    el.innerHTML=`<span class="badge ok">${schools.length}개 발견</span><div class="box">`+
      schools.map(s=>`
        <div class="kv">
          <span>${s.place_name} <span style="color:#4a4642;font-size:10px">${s.distance}m</span></span>
          <span>
            <button class="sec" style="font-size:10px;padding:2px 8px" onclick="useSchool('${s.place_name}')">④에서 코드검색</button>
          </span>
        </div>
        <div style="font-size:10px;color:#4a4642;padding:2px 0 6px">${s.road_address_name||s.address_name}</div>
      `).join('')+'</div>';
  }catch(e){ el.innerHTML=`<span class="badge err">오류: ${e.message}</span>`; }
}

function useSchool(name){
  document.getElementById('si_name').value=name;
  searchNeisSchool();
}

// ④ NEIS 학교코드 검색
async function searchNeisSchool(){
  const atpt=document.getElementById('si_atpt').value;
  const name=document.getElementById('si_name').value.trim();
  const el=document.getElementById('neis_school_result');
  el.innerHTML='<span class="badge warn">검색 중...</span>';
  try{
    const r=await fetch(
      `https://open.neis.go.kr/hub/schoolInfo?KEY=${NEIS_KEY}&Type=json&pSize=20&pIndex=1` +
      `&ATPT_OFCDC_SC_CODE=${atpt}&SCHUL_KND_SC_NM=${encodeURIComponent('중학교')}&SCHUL_NM=${encodeURIComponent(name)}`
    );
    const d=await r.json();
    if(d?.RESULT?.CODE){ el.innerHTML=`<span class="badge err">${d.RESULT.CODE}: ${d.RESULT.MESSAGE}</span>`; return; }
    const rows=d?.schoolInfo?.[1]?.row||[];
    if(!rows.length){ el.innerHTML='<span class="badge warn">검색 결과 없음 — 학교명 줄여보세요 (예: 대치중)</span>'; return; }
    el.innerHTML=`<span class="badge ok">${rows.length}개 학교</span><div class="box">`+
      rows.map(s=>`
        <div class="kv">
          <span>${s.SCHUL_NM}</span>
          <span>
            <span class="badge info" style="cursor:pointer" onclick="fillCode('${s.SD_SCHUL_CODE}','${atpt}')">${s.SD_SCHUL_CODE} (클릭→②에 입력)</span>
          </span>
        </div>
        <div style="font-size:10px;color:#4a4642;padding:2px 0 6px">${s.ORG_RDNMA||''} · ${s.ATPT_OFCDC_SC_CODE}</div>
      `).join('')+'</div>';
  }catch(e){ el.innerHTML=`<span class="badge err">오류: ${e.message}</span>`; }
}

function fillCode(code, atpt){
  document.getElementById('svc_code').value=code;
  document.getElementById('svc_atpt').value=atpt;
  document.getElementById('schul_code').value=code;
  document.getElementById('atpt2').value=atpt;
  alert('학교코드 '+code+' 입력 완료! ①에서 탐색 또는 ②에서 직접 테스트하세요');
}
</script>
</body>
</html>
