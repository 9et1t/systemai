<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NH농협 IT 작업 업무확인 게시판</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Noto+Serif+KR:wght@600;700&display=swap" rel="stylesheet"/>
<style>
:root {
  --nh-green:   #006633;
  --nh-green2:  #008844;
  --nh-green3:  #00aa55;
  --nh-gold:    #c8a84b;
  --nh-gold2:   #e8c86e;
  --nh-light:   #f0f7f2;
  --nh-white:   #ffffff;
  --nh-gray1:   #f5f6f7;
  --nh-gray2:   #e8eaed;
  --nh-gray3:   #c4c8cc;
  --nh-gray4:   #8a9099;
  --nh-text:    #1a2530;
  --nh-text2:   #3d4a55;
  --nh-text3:   #6b7a87;
  --nh-red:     #cc3300;
  --nh-blue:    #1155aa;
  --shadow-sm:  0 1px 4px rgba(0,102,51,0.08);
  --shadow-md:  0 4px 16px rgba(0,102,51,0.12);
  --shadow-lg:  0 8px 32px rgba(0,102,51,0.16);
  --radius:     10px;
  --sans: 'Noto Sans KR', sans-serif;
  --serif: 'Noto Serif KR', serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:var(--sans);
  background:var(--nh-gray1);
  color:var(--nh-text);
  min-height:100vh;
}

/* ───── TOP BAND ───── */
.top-band{
  background:var(--nh-green);
  height:4px;
  background:linear-gradient(90deg,var(--nh-green) 0%,var(--nh-gold) 60%,var(--nh-green2) 100%);
}

/* ───── HEADER ───── */
header{
  background:var(--nh-white);
  border-bottom:2px solid var(--nh-green);
  box-shadow:var(--shadow-sm);
  position:sticky;top:0;z-index:200;
}
.header-inner{
  max-width:1100px;margin:0 auto;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 1.5rem;height:64px;
}
.logo{display:flex;align-items:center;gap:14px}
.logo-ci{
  height:36px;width:auto;
  object-fit:contain;
  flex-shrink:0;
  filter: drop-shadow(0 1px 3px rgba(0,102,51,0.15));
}
.logo-divider{
  width:1px;height:28px;
  background:var(--nh-gray2);
  flex-shrink:0;
}
.logo-text{line-height:1.2}
.logo-text strong{
  display:block;font-size:1rem;font-weight:700;
  color:var(--nh-green);letter-spacing:-0.02em;
}
.logo-text span{
  font-size:0.7rem;color:var(--nh-text3);letter-spacing:0.02em;
}
.header-right{display:flex;align-items:center;gap:10px}

.github-status{
  font-size:0.72rem;padding:4px 10px;
  border-radius:20px;border:1px solid;
  font-weight:500;
}
.github-status.connected{
  background:#e6f4ec;color:var(--nh-green);border-color:#99d4b3;
}
.github-status.disconnected{
  background:#fff3e0;color:#b36a00;border-color:#ffc966;
}

/* ───── HERO ───── */
.hero{
  background:linear-gradient(135deg,var(--nh-green) 0%,var(--nh-green2) 50%,#005522 100%);
  color:#fff;padding:2rem 1.5rem;
  position:relative;overflow:hidden;
}
.hero::before{
  content:'';position:absolute;inset:0;
  background:
    radial-gradient(ellipse 70% 60% at 90% 50%,rgba(200,168,75,0.15) 0%,transparent 60%),
    url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
}
.hero-inner{max-width:1100px;margin:0 auto;position:relative}
.hero h1{
  font-family:var(--serif);font-size:1.5rem;font-weight:700;
  letter-spacing:-0.02em;margin-bottom:4px;
}
.hero h1 span{color:var(--nh-gold2)}
.hero p{font-size:0.8rem;opacity:0.8;margin-bottom:1.2rem}
.stats-row{display:flex;gap:1rem;flex-wrap:wrap}
.stat-pill{
  background:rgba(255,255,255,0.12);
  border:1px solid rgba(255,255,255,0.2);
  border-radius:20px;padding:6px 16px;
  font-size:0.78rem;display:flex;align-items:center;gap:6px;
}
.stat-pill b{font-size:1rem;font-weight:700}

/* ───── MAIN LAYOUT ───── */
.main{max-width:1100px;margin:0 auto;padding:1.5rem}

/* ───── SECTION LABEL ───── */
.sec-label{
  display:flex;align-items:center;gap:10px;
  margin-bottom:0.8rem;
}
.sec-label h2{
  font-size:0.78rem;font-weight:700;
  color:var(--nh-green);text-transform:uppercase;letter-spacing:0.1em;
}
.sec-label-line{flex:1;height:1px;background:var(--nh-gray2)}

/* ───── REGISTER CARD ───── */
.register-card{
  background:var(--nh-white);
  border:1px solid var(--nh-gray2);
  border-top:3px solid var(--nh-green);
  border-radius:var(--radius);
  box-shadow:var(--shadow-sm);
  padding:1.2rem;margin-bottom:1.5rem;
}
.reg-row{
  display:grid;grid-template-columns:150px 1fr auto;
  gap:0.75rem;align-items:end;
}
.fg{display:flex;flex-direction:column;gap:5px}
.fg label{
  font-size:0.7rem;font-weight:700;
  color:var(--nh-green);letter-spacing:0.05em;
}
.fg input,.fg select,.fg textarea{
  border:1px solid var(--nh-gray2);
  border-radius:6px;
  padding:0.55rem 0.8rem;
  font-family:var(--sans);font-size:0.85rem;
  color:var(--nh-text);
  background:#fff;outline:none;
  transition:border-color 0.2s,box-shadow 0.2s;
}
.fg input:focus,.fg select:focus,.fg textarea:focus{
  border-color:var(--nh-green);
  box-shadow:0 0 0 3px rgba(0,102,51,0.1);
}
.fg textarea{resize:vertical;min-height:60px}

/* ───── BUTTONS ───── */
.btn{
  padding:0.55rem 1.2rem;border:none;border-radius:6px;
  font-family:var(--sans);font-size:0.82rem;font-weight:700;
  cursor:pointer;transition:all 0.2s;letter-spacing:0.01em;
  white-space:nowrap;
}
.btn-primary{background:var(--nh-green);color:#fff}
.btn-primary:hover{background:var(--nh-green2);box-shadow:var(--shadow-sm)}
.btn-gold{background:var(--nh-gold);color:#fff}
.btn-gold:hover{background:var(--nh-gold2);color:var(--nh-text)}
.btn-ghost{
  background:transparent;color:var(--nh-text3);
  border:1px solid var(--nh-gray3);
}
.btn-ghost:hover{border-color:var(--nh-green);color:var(--nh-green)}
.btn-danger{background:#fdf0ed;color:var(--nh-red);border:1px solid #f5c4b8}
.btn-danger:hover{background:#fbe0d9}
.btn-sm{padding:0.35rem 0.75rem;font-size:0.72rem}
.btn-xs{padding:0.25rem 0.6rem;font-size:0.68rem}

/* ───── FILTER BAR ───── */
.filter-bar{
  display:flex;align-items:center;gap:0.5rem;
  margin-bottom:1rem;flex-wrap:wrap;
}
.f-btn{
  font-size:0.75rem;padding:5px 14px;
  border-radius:20px;border:1px solid var(--nh-gray3);
  background:#fff;color:var(--nh-text3);
  cursor:pointer;transition:all 0.2s;font-family:var(--sans);
}
.f-btn.active{
  background:var(--nh-green);color:#fff;border-color:var(--nh-green);
}
.f-btn:hover:not(.active){border-color:var(--nh-green);color:var(--nh-green)}
.search-wrap{margin-left:auto;position:relative}
.search-wrap input{
  border:1px solid var(--nh-gray3);border-radius:20px;
  padding:5px 14px 5px 32px;
  font-family:var(--sans);font-size:0.78rem;
  background:#fff;outline:none;width:200px;
  transition:border-color 0.2s;
}
.search-wrap input:focus{border-color:var(--nh-green)}
.search-wrap::before{
  content:'🔍';position:absolute;left:10px;top:50%;transform:translateY(-50%);
  font-size:0.72rem;
}

/* ───── TASK CARDS ───── */
.board-list{display:flex;flex-direction:column;gap:0.8rem}
.task-card{
  background:var(--nh-white);
  border:1px solid var(--nh-gray2);
  border-left:4px solid var(--nh-green);
  border-radius:var(--radius);
  box-shadow:var(--shadow-sm);
  overflow:hidden;
  transition:border-color 0.2s,box-shadow 0.2s;
  animation:fadeUp 0.35s ease both;
}
.task-card:hover{box-shadow:var(--shadow-md)}
.task-card.done{border-left-color:var(--nh-gold)}
.task-card.expanded{border-color:var(--nh-green3);box-shadow:var(--shadow-md)}

.task-header{
  padding:1rem 1.2rem;
  display:flex;align-items:center;gap:0.8rem;
  cursor:pointer;user-select:none;
}
.task-header:hover{background:var(--nh-light)}
.task-seq{
  font-size:0.68rem;font-weight:700;
  color:var(--nh-gray4);min-width:32px;
}
.date-tag{
  font-size:0.72rem;font-weight:700;
  background:var(--nh-light);border:1px solid #c8dfd0;
  color:var(--nh-green);border-radius:6px;
  padding:3px 10px;white-space:nowrap;
}
.task-info{flex:1;min-width:0}
.task-name{
  font-size:0.92rem;font-weight:700;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.task-sub{
  font-size:0.72rem;color:var(--nh-text3);margin-top:2px;
}
.task-actions{display:flex;align-items:center;gap:0.5rem;flex-shrink:0}
.reply-badge{
  font-size:0.7rem;background:#e8f4ee;color:var(--nh-green2);
  border:1px solid #b3d9c0;border-radius:20px;padding:2px 9px;font-weight:700;
}
.status-tag{
  font-size:0.68rem;font-weight:700;padding:3px 10px;
  border-radius:20px;letter-spacing:0.03em;
}
.status-ongoing{background:#fff8e1;color:#a07000;border:1px solid #ffe082}
.status-done{background:#e8f4ee;color:var(--nh-green);border:1px solid #b3d9c0}
.chevron{
  width:16px;height:16px;color:var(--nh-gray4);
  transition:transform 0.3s;flex-shrink:0;
}
.expanded .chevron{transform:rotate(180deg)}

/* ───── TASK BODY ───── */
.task-body{display:none;border-top:1px solid var(--nh-gray2)}
.task-body.show{display:block}

.task-desc-box{
  background:var(--nh-light);
  border-bottom:1px dashed var(--nh-gray2);
  padding:0.9rem 1.2rem;
}
.task-desc-box .lbl{
  font-size:0.68rem;font-weight:700;color:var(--nh-green);
  text-transform:uppercase;letter-spacing:0.08em;margin-bottom:4px;
}
.task-desc-box p{font-size:0.82rem;color:var(--nh-text2);line-height:1.6}

/* ───── REPLIES ───── */
.replies-wrap{padding:1rem 1.2rem}
.replies-head{
  display:flex;align-items:center;gap:8px;
  margin-bottom:0.8rem;
}
.replies-head span{
  font-size:0.72rem;font-weight:700;color:var(--nh-green);
  text-transform:uppercase;letter-spacing:0.08em;
}
.replies-head small{font-size:0.7rem;color:var(--nh-text3)}

.reply-list{display:flex;flex-direction:column;gap:0.6rem;margin-bottom:1rem}
.reply-item{
  background:var(--nh-gray1);border:1px solid var(--nh-gray2);
  border-radius:8px;padding:0.8rem 1rem;
  display:grid;grid-template-columns:36px 1fr auto;gap:0.7rem;
  align-items:start;
  animation:fadeUp 0.25s ease both;
}
.reply-avatar{
  width:36px;height:36px;border-radius:50%;
  background:linear-gradient(135deg,var(--nh-green),var(--nh-green2));
  display:flex;align-items:center;justify-content:center;
  font-size:0.82rem;font-weight:700;color:#fff;
  border:2px solid var(--nh-gold);
  flex-shrink:0;
}
.reply-body{}
.reply-meta{display:flex;align-items:center;gap:6px;margin-bottom:4px;flex-wrap:wrap}
.reply-name{font-size:0.85rem;font-weight:700;color:var(--nh-text)}
.reply-dept-tag{
  font-size:0.66rem;background:#e8f4ee;color:var(--nh-green);
  border:1px solid #b3d9c0;border-radius:4px;padding:1px 6px;font-weight:700;
}
.reply-duty-tag{
  font-size:0.66rem;background:#fff8e1;color:#a07000;
  border:1px solid #ffe082;border-radius:4px;padding:1px 6px;font-weight:700;
}
.reply-time{font-size:0.65rem;color:var(--nh-text3)}
.reply-text{
  font-size:0.82rem;color:var(--nh-text2);line-height:1.6;
  white-space:pre-wrap;
}
.reply-confirm-mark{
  display:inline-flex;align-items:center;gap:3px;
  font-size:0.66rem;color:var(--nh-green);font-weight:700;margin-top:4px;
}
.reply-controls{display:flex;flex-direction:column;gap:3px;flex-shrink:0}

/* inline edit */
.reply-edit-area{
  width:100%;border:1px solid var(--nh-green);border-radius:6px;
  padding:0.5rem;font-family:var(--sans);font-size:0.82rem;
  color:var(--nh-text);background:#fff;outline:none;resize:vertical;
  min-height:60px;margin-top:4px;
}
.reply-edit-btns{display:flex;gap:4px;margin-top:4px}

/* ───── REPLY FORM ───── */
.reply-form{
  background:linear-gradient(135deg,#f0f7f2,#e8f4ee);
  border:1px solid #c8dfd0;border-radius:8px;padding:1rem;
}
.reply-form-title{
  font-size:0.75rem;font-weight:700;color:var(--nh-green);
  margin-bottom:0.7rem;letter-spacing:0.05em;
  display:flex;align-items:center;gap:6px;
}
.reply-form-title::before{
  content:'';display:inline-block;width:3px;height:14px;
  background:var(--nh-gold);border-radius:2px;
}
.rf-grid{
  display:grid;grid-template-columns:1fr 1fr 1fr;
  gap:0.5rem;margin-bottom:0.5rem;
}
.rf-bottom{
  display:grid;grid-template-columns:1fr auto;
  gap:0.5rem;align-items:end;
}

/* ───── MODAL ───── */
.modal-backdrop{
  display:none;position:fixed;inset:0;
  background:rgba(0,60,20,0.5);backdrop-filter:blur(4px);
  z-index:400;align-items:center;justify-content:center;padding:1rem;
}
.modal-backdrop.show{display:flex}
.modal{
  background:#fff;border-radius:12px;
  box-shadow:var(--shadow-lg);
  width:100%;max-width:560px;
  border-top:4px solid var(--nh-green);
  animation:fadeUp 0.3s ease;
  max-height:90vh;overflow-y:auto;
}
.modal-head{
  padding:1.2rem 1.5rem 1rem;
  border-bottom:1px solid var(--nh-gray2);
  display:flex;align-items:center;gap:10px;
}
.modal-head h3{font-size:1rem;font-weight:700;flex:1}
.modal-head .close-btn{
  background:none;border:none;font-size:1.3rem;
  color:var(--nh-gray4);cursor:pointer;
}
.modal-body{padding:1.2rem 1.5rem}
.modal-grid{
  display:grid;grid-template-columns:1fr 1fr;
  gap:0.75rem;margin-bottom:0.75rem;
}
.modal-full{margin-bottom:0.75rem}
.modal-foot{
  padding:1rem 1.5rem;border-top:1px solid var(--nh-gray2);
  display:flex;justify-content:flex-end;gap:0.5rem;
}

/* ───── CONFIG MODAL ───── */


/* ───── LOADING ───── */
.loading{
  text-align:center;padding:3rem;
  color:var(--nh-text3);font-size:0.85rem;
}
.spinner{
  width:32px;height:32px;border:3px solid var(--nh-gray2);
  border-top-color:var(--nh-green);border-radius:50%;
  animation:spin 0.8s linear infinite;margin:0 auto 12px;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ───── EMPTY ───── */
.empty{
  text-align:center;padding:4rem 2rem;
  color:var(--nh-text3);font-size:0.82rem;
}
.empty-icon{font-size:2.5rem;margin-bottom:10px;opacity:0.5}

/* ───── TOAST ───── */
.toast{
  position:fixed;bottom:1.5rem;right:1.5rem;
  background:var(--nh-green);color:#fff;
  border-radius:8px;padding:0.75rem 1.2rem;
  font-size:0.8rem;font-weight:500;
  z-index:500;opacity:0;transform:translateY(8px);
  transition:all 0.3s;pointer-events:none;
  box-shadow:var(--shadow-md);max-width:300px;
}
.toast.error{background:var(--nh-red)}
.toast.show{opacity:1;transform:translateY(0)}

/* ───── ANIM ───── */
@keyframes fadeUp{
  from{opacity:0;transform:translateY(8px)}
  to{opacity:1;transform:translateY(0)}
}

/* ───── RESPONSIVE ───── */
@media(max-width:720px){
  .reg-row{grid-template-columns:1fr}
  .rf-grid{grid-template-columns:1fr 1fr}
  .modal-grid{grid-template-columns:1fr}
  .stats-row{gap:0.6rem}
  .header-inner{padding:0 1rem}
  .main{padding:1rem}
}
</style>
</head>

  <div class="board-list" id="boardList">
    <div class="loading"><div class="spinner"></div>GitHub 설정 후 작업 목록이 로드됩니다.</div>
  </div>
</div>

<!-- ══════════════════ 작업등록 MODAL ══════════════════ -->

            <option>하드웨어 교체</option><option>기타</option>

<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════════
// CONFIG — 하드코딩 or localStorage
// ══════════════════════════════════════════════
// ▼▼▼ 여기에 직접 입력하면 설정 화면 없이 바로 동작합니다 ▼▼▼
const PRESET = {
  owner: 'get1t',
  repo:  'systemai',
  token: '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'
};
// ▲▲▲ 세 항목 모두 입력 시 localStorage 설정을 무시하고 PRESET 사용 ▲▲▲

const CFG_KEY = 'nh_board_config';
let cfg = {};
let allIssues = [];
let currentFilter = 'all';
let currentSearch = '';

function loadCfg(){
  // PRESET이 모두 채워져 있으면 우선 사용
  if(PRESET.owner && PRESET.repo && PRESET.token){
    cfg = { owner: PRESET.owner, repo: PRESET.repo, token: PRESET.token };
    return;
  }
  try{
    const ls = localStorage.getItem(CFG_KEY);
    const ss = sessionStorage.getItem(CFG_KEY);
    if(ls){ cfg = JSON.parse(ls); }
    else if(ss){ cfg = JSON.parse(ss); localStorage.setItem(CFG_KEY, ss); }
    else{ cfg = {}; }
  }catch{ cfg={}; }
}
function saveCfg(){
  const s = JSON.stringify(cfg);
  try{ localStorage.setItem(CFG_KEY, s); }catch{}
  try{ sessionStorage.setItem(CFG_KEY, s); }catch{}
}

// ══════════════════════════════════════════════
// GITHUB API HELPERS
// ══════════════════════════════════════════════
const GH = 'https://api.github.com';

function apiHeaders(){
  const h = { 'Accept':'application/vnd.github+json',
               'X-GitHub-Api-Version':'2022-11-28' };
  if(cfg.token) h['Authorization'] = 'Bearer ' + cfg.token;
  return h;
}

async function ghGet(path){
  const r = await fetch(GH+path, {headers:apiHeaders()});
  if(!r.ok) throw new Error('API 오류: '+r.status+' '+r.statusText);
  return r.json();
}
async function ghPost(path, body){
  const r = await fetch(GH+path, {
    method:'POST', headers:{...apiHeaders(),'Content-Type':'application/json'},
    body: JSON.stringify(body)
  });
  if(!r.ok) throw new Error('API 오류: '+r.status+' '+r.statusText);
  return r.json();
}
async function ghPatch(path, body){
  const r = await fetch(GH+path, {
    method:'PATCH', headers:{...apiHeaders(),'Content-Type':'application/json'},
    body: JSON.stringify(body)
  });
  if(!r.ok) throw new Error('API 오류: '+r.status+' '+r.statusText);
  return r.json();
}
async function ghDelete(path){
  const r = await fetch(GH+path, {method:'DELETE', headers:apiHeaders()});
  if(r.status===204) return true;
  throw new Error('삭제 오류: '+r.status);
}

function repoPath(){ return `/repos/${cfg.owner}/${cfg.repo}`; }
function isConfigured(){ return cfg.owner && cfg.repo && cfg.token; }

// ══════════════════════════════════════════════
// PARSE ISSUE ↔ TASK
// ══════════════════════════════════════════════
function issueToTask(issue){
  // body 파싱: <!-- NH_META: {...} -->
  let meta = {};
  const m = (issue.body||'').match(/<!--NH_META:(.*?)-->/s);
  if(m){ try{ meta = JSON.parse(m[1]); }catch{} }
  return {
    id: issue.number,
    ghId: issue.number,
    title: issue.title,
    status: issue.state,          // 'open' | 'closed'
    date: meta.date||'',
    type: meta.type||'',
    desc: meta.desc||'',
    startTime: meta.startTime||'',
    endTime: meta.endTime||'',
    author: meta.author||'',
    createdAt: issue.created_at,
    _expanded: false,
    _replies: []
  };
}

function taskToBody(meta, desc){
  return `<!--NH_META:${JSON.stringify(meta)}-->\n\n${desc||''}`;
}

// ══════════════════════════════════════════════
// COMMENT ↔ REPLY
// ══════════════════════════════════════════════
function commentToReply(c){
  let meta = {};
  const m = (c.body||'').match(/<!--REPLY_META:(.*?)-->/s);
  if(m){ try{ meta = JSON.parse(m[1]); }catch{} }
  const text = (c.body||'').replace(/<!--REPLY_META:.*?-->/s,'').trim();
  return {
    id: c.id,
    dept: meta.dept||'',
    name: meta.name||'',
    duty: meta.duty||'',
    content: text,
    createdAt: c.created_at,
    updatedAt: c.updated_at
  };
}

function replyToBody(meta, content){
  return `<!--REPLY_META:${JSON.stringify(meta)}-->\n${content}`;
}

// ══════════════════════════════════════════════
// LOAD ISSUES
// ══════════════════════════════════════════════
async function loadIssues(){
  const list = document.getElementById('boardList');
  if(!isConfigured()){
    list.innerHTML = `<div class="empty"><div class="empty-icon">🔗</div>
      <p>연결 정보가 없습니다.<br/>코드 상단 <strong>PRESET</strong> 항목을 확인해주세요.</p></div>`;
    updateStats([]);
    return;
  }
  list.innerHTML = `<div class="loading"><div class="spinner"></div>작업 목록 불러오는 중...</div>`;
  try{
    // 최대 100개
    const issues = await ghGet(repoPath()+'/issues?state=all&per_page=100');
    allIssues = issues.filter(i=>!i.pull_request).map(issueToTask);
    renderBoard();
    updateStats(allIssues);
    updateGhStatus(true);
  }catch(e){
    list.innerHTML = `<div class="empty"><div class="empty-icon">⚠</div>
      <p>불러오기 실패: ${e.message}<br/>GitHub 설정을 확인해주세요.</p></div>`;
    updateGhStatus(false);
  }
}

// ══════════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════════
function renderBoard(){
  let tasks = [...allIssues].sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));
  if(currentFilter==='open') tasks=tasks.filter(t=>t.status==='open');
  if(currentFilter==='closed') tasks=tasks.filter(t=>t.status==='closed');
  if(currentSearch) tasks=tasks.filter(t=>t.title.includes(currentSearch)||(t.type||'').includes(currentSearch));
  const list=document.getElementById('boardList');
  if(!tasks.length){
    list.innerHTML=`<div class="empty"><div class="empty-icon">📭</div><p>등록된 작업이 없습니다.</p></div>`;
    return;
  }
  list.innerHTML=tasks.map((t,i)=>renderTaskCard(t,i+1)).join('');
}

function renderTaskCard(t, num){
  const exp = t._expanded;
  const dateStr = t.date ? formatDate(t.date) : '날짜미정';
  const statusLabel = t.status==='open' ? '진행중' : '완료';
  const statusClass = t.status==='open' ? 'status-ongoing' : 'status-done';
  const cardClass = t.status==='closed' ? 'done' : '';
  return `
<div class="task-card ${cardClass} ${exp?'expanded':''}" id="card_${t.id}">
  <div class="task-header" onclick="toggleCard(${t.id})">
    <span class="task-seq">#${String(num).padStart(3,'0')}</span>
    <span class="date-tag">📅 ${dateStr}</span>
    <div class="task-info">
      <div class="task-name">${esc(t.title)}</div>
      <div class="task-sub">${esc(t.type)} ${t.startTime?'· '+t.startTime+(t.endTime?' ~ '+t.endTime:''):''} ${t.author?'· 등록: '+esc(t.author):''}</div>
    </div>
    <div class="task-actions">
      <span class="reply-badge" id="rc_${t.id}">💬 ${t._replies.length}</span>
      <span class="status-tag ${statusClass}">${statusLabel}</span>
      ${t.status==='open'
        ? `<button class="btn btn-gold btn-sm" onclick="event.stopPropagation();closeTask(${t.id})">✓ 완료</button>`
        : `<button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();reopenTask(${t.id})">↺ 재개</button>`}
      <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <polyline points="6,9 12,15 18,9"/>
      </svg>
    </div>
  </div>
  <div class="task-body ${exp?'show':''}" id="body_${t.id}">
    ${t.desc?`<div class="task-desc-box"><div class="lbl">작업 설명</div><p>${esc(t.desc).replace(/\n/g,'<br>')}</p></div>`:''}
    <div class="replies-wrap">
      <div class="replies-head">
        <span>업무확인 응답</span>
        <small id="rcount_${t.id}">${t._replies.length}건</small>
      </div>
      <div class="reply-list" id="rlist_${t.id}">
        ${t._replies.length
          ? t._replies.map(r=>renderReply(r,t.id)).join('')
          : `<div style="font-size:0.78rem;color:var(--nh-text3);padding:0.4rem 0">아직 업무확인 응답이 없습니다.</div>`}
      </div>
      <div class="reply-form" id="rform_${t.id}">
        <div class="reply-form-title">업무확인 응답 작성</div>
        <div class="rf-grid">
          <div class="fg"><label>소속 부서</label><input type="text" id="fdept_${t.id}" placeholder="인프라팀"/></div>
          <div class="fg"><label>이름</label><input type="text" id="fname_${t.id}" placeholder="홍길동"/></div>
          <div class="fg"><label>담당 업무</label><input type="text" id="fduty_${t.id}" placeholder="서버 담당"/></div>
        </div>
        <div class="rf-bottom">
          <div class="fg"><label>확인 내용</label>
            <textarea id="fcont_${t.id}" placeholder="담당 업무 확인 내용을 입력하세요..."></textarea>
          </div>
          <button class="btn btn-primary" onclick="submitReply(${t.id})">확인 등록</button>
        </div>
      </div>
    </div>
  </div>
</div>`;
}

function renderReply(r, taskId){
  const init = r.name ? r.name.charAt(0) : '?';
  const edited = r.updatedAt && r.updatedAt !== r.createdAt ? ' (수정됨)' : '';
  return `
<div class="reply-item" id="ri_${r.id}">
  <div class="reply-avatar">${esc(init)}</div>
  <div class="reply-body">
    <div class="reply-meta">
      <span class="reply-name">${esc(r.name)}</span>
      <span class="reply-dept-tag">${esc(r.dept)}</span>
      <span class="reply-duty-tag">${esc(r.duty)}</span>
      <span class="reply-time">${formatDt(r.createdAt)}${edited}</span>
    </div>
    <div class="reply-text" id="rtext_${r.id}">${esc(r.content).replace(/\n/g,'<br>')}</div>
    <div class="reply-confirm-mark">✅ 업무확인 완료</div>
    <!-- 인라인 수정 영역 (숨김) -->
    <div id="redit_${r.id}" style="display:none">
      <textarea class="reply-edit-area" id="retxt_${r.id}">${esc(r.content)}</textarea>
      <div class="reply-edit-btns">
        <button class="btn btn-primary btn-xs" onclick="saveEdit(${taskId},${r.id})">저장</button>
        <button class="btn btn-ghost btn-xs" onclick="cancelEdit(${r.id})">취소</button>
      </div>
    </div>
  </div>
  <div class="reply-controls">
    <button class="btn btn-ghost btn-xs" onclick="startEdit(${r.id})" title="수정">✏</button>
    <button class="btn btn-danger btn-xs" onclick="deleteReply(${taskId},${r.id})" title="삭제">✕</button>
  </div>
</div>`;
}

// ══════════════════════════════════════════════
// TOGGLE CARD + LOAD REPLIES
// ══════════════════════════════════════════════
async function toggleCard(id){
  const task = allIssues.find(t=>t.id===id);
  if(!task) return;
  task._expanded = !task._expanded;
  const card = document.getElementById('card_'+id);
  const body = document.getElementById('body_'+id);
  if(task._expanded){
    card.classList.add('expanded');
    body.classList.add('show');
    // 댓글 로드 (처음 열 때)
    if(!task._loaded){
      await loadReplies(task);
    }
  } else {
    card.classList.remove('expanded');
    body.classList.remove('show');
  }
}

async function loadReplies(task){
  const listEl = document.getElementById('rlist_'+task.id);
  listEl.innerHTML = `<div style="font-size:0.78rem;color:var(--nh-text3)">댓글 불러오는 중...</div>`;
  try{
    const comments = await ghGet(repoPath()+'/issues/'+task.id+'/comments');
    task._replies = comments.map(commentToReply);
    task._loaded = true;
    refreshReplies(task);
    updateStats(allIssues);
  }catch(e){
    listEl.innerHTML = `<div style="font-size:0.78rem;color:var(--nh-red)">댓글 로드 실패: ${e.message}</div>`;
  }
}

function refreshReplies(task){
  const listEl = document.getElementById('rlist_'+task.id);
  const rcEl = document.getElementById('rc_'+task.id);
  const rcountEl = document.getElementById('rcount_'+task.id);
  if(listEl){
    listEl.innerHTML = task._replies.length
      ? task._replies.map(r=>renderReply(r,task.id)).join('')
      : `<div style="font-size:0.78rem;color:var(--nh-text3);padding:0.4rem 0">아직 업무확인 응답이 없습니다.</div>`;
  }
  if(rcEl) rcEl.textContent = '💬 '+task._replies.length;
  if(rcountEl) rcountEl.textContent = task._replies.length+'건';
}

// ══════════════════════════════════════════════
// NEW TASK
// ══════════════════════════════════════════════
function openNewModal(){
  if(!isConfigured()){
    showToast('코드 상단 PRESET에 토큰을 입력해주세요.','error'); return;
  }
  const dv = document.getElementById('qDate').value;
  const tv = document.getElementById('qTitle').value;
  if(dv) document.getElementById('mDate').value=dv;
  if(tv) document.getElementById('mTitle').value=tv;
  document.getElementById('newModal').classList.add('show');
}
function closeNewModal(){ document.getElementById('newModal').classList.remove('show'); }
document.getElementById('newModal').addEventListener('click',e=>{ if(e.target===e.currentTarget) closeNewModal(); });

async function submitNewTask(){
  const date=v('mDate'), title=v('mTitle').trim(), type=v('mType'),
        desc=v('mDesc').trim(), st=v('mSt'), et=v('mEt'), author=v('mAuthor').trim();
  if(!date||!title){ showToast('날짜와 작업명은 필수입니다.','error'); return; }
  const meta = {date,type,desc,startTime:st,endTime:et,author};
  const btn = document.querySelector('#newModal .btn-primary');
  btn.textContent='등록중...'; btn.disabled=true;
  try{
    const issue = await ghPost(repoPath()+'/issues',{
      title: title,
      body: taskToBody(meta, desc)
    });
    const task = issueToTask(issue);
    task._replies=[];task._loaded=true;
    allIssues.unshift(task);
    renderBoard(); updateStats(allIssues);
    ['mDate','mTitle','mDesc','mSt','mEt','mAuthor'].forEach(id=>{ const el=document.getElementById(id); if(el) el.value=''; });
    document.getElementById('qTitle').value='';
    closeNewModal();
    showToast('✓ 작업이 등록되었습니다.');
  }catch(e){ showToast('등록 실패: '+e.message,'error'); }
  finally{ btn.textContent='등록'; btn.disabled=false; }
}

// ══════════════════════════════════════════════
// TASK STATUS
// ══════════════════════════════════════════════
async function closeTask(id){
  if(!confirm('작업을 완료 처리하시겠습니까?')) return;
  try{
    await ghPatch(repoPath()+'/issues/'+id,{state:'closed'});
    const t=allIssues.find(t=>t.id===id);
    if(t){ t.status='closed'; }
    renderBoard(); updateStats(allIssues);
    showToast('✓ 완료 처리되었습니다.');
  }catch(e){ showToast('오류: '+e.message,'error'); }
}
async function reopenTask(id){
  try{
    await ghPatch(repoPath()+'/issues/'+id,{state:'open'});
    const t=allIssues.find(t=>t.id===id);
    if(t){ t.status='open'; }
    renderBoard(); updateStats(allIssues);
    showToast('✓ 재개 처리되었습니다.');
  }catch(e){ showToast('오류: '+e.message,'error'); }
}

// ══════════════════════════════════════════════
// SUBMIT REPLY
// ══════════════════════════════════════════════
async function submitReply(taskId){
  const dept=v('fdept_'+taskId).trim(), name=v('fname_'+taskId).trim(),
        duty=v('fduty_'+taskId).trim(), content=v('fcont_'+taskId).trim();
  if(!dept||!name||!duty||!content){ showToast('모든 항목을 입력해주세요.','error'); return; }
  const meta = {dept,name,duty};
  const btn = document.querySelector(`#rform_${taskId} .btn-primary`);
  btn.textContent='등록중...'; btn.disabled=true;
  try{
    const comment = await ghPost(repoPath()+'/issues/'+taskId+'/comments',{
      body: replyToBody(meta,content)
    });
    const reply = commentToReply(comment);
    const task = allIssues.find(t=>t.id===taskId);
    if(task){ task._replies.push(reply); refreshReplies(task); }
    ['fdept_','fname_','fduty_','fcont_'].forEach(p=>{ const el=document.getElementById(p+taskId); if(el) el.value=''; });
    updateStats(allIssues);
    showToast('✓ 업무확인 응답이 등록되었습니다.');
  }catch(e){ showToast('등록 실패: '+e.message,'error'); }
  finally{ btn.textContent='확인 등록'; btn.disabled=false; }
}

// ══════════════════════════════════════════════
// EDIT REPLY (인라인)
// ══════════════════════════════════════════════
function startEdit(replyId){
  document.getElementById('rtext_'+replyId).style.display='none';
  document.getElementById('redit_'+replyId).style.display='block';
  // textarea에 현재 텍스트 (이스케이프 해제)
  const task = allIssues.find(t=>t._replies&&t._replies.find(r=>r.id===replyId));
  if(task){
    const reply = task._replies.find(r=>r.id===replyId);
    if(reply) document.getElementById('retxt_'+replyId).value = reply.content;
  }
}
function cancelEdit(replyId){
  document.getElementById('rtext_'+replyId).style.display='';
  document.getElementById('redit_'+replyId).style.display='none';
}

async function saveEdit(taskId, replyId){
  const newContent = document.getElementById('retxt_'+replyId).value.trim();
  if(!newContent){ showToast('내용을 입력해주세요.','error'); return; }
  const task = allIssues.find(t=>t.id===taskId);
  if(!task) return;
  const reply = task._replies.find(r=>r.id===replyId);
  if(!reply) return;
  const meta = {dept:reply.dept, name:reply.name, duty:reply.duty};
  const btn = document.querySelector(`#ri_${replyId} .btn-primary`);
  if(btn){ btn.textContent='저장중...'; btn.disabled=true; }
  try{
    const updated = await ghPatch(repoPath()+'/issues/comments/'+replyId,{
      body: replyToBody(meta, newContent)
    });
    const r = commentToReply(updated);
    const idx = task._replies.findIndex(rr=>rr.id===replyId);
    if(idx!==-1) task._replies[idx]=r;
    refreshReplies(task);
    showToast('✓ 응답이 수정되었습니다.');
  }catch(e){ showToast('수정 실패: '+e.message,'error'); if(btn){btn.textContent='저장';btn.disabled=false;} }
}

// ══════════════════════════════════════════════
// DELETE REPLY
// ══════════════════════════════════════════════
async function deleteReply(taskId, replyId){
  if(!confirm('이 응답을 삭제하시겠습니까?')) return;
  try{
    await ghDelete(repoPath()+'/issues/comments/'+replyId);
    const task = allIssues.find(t=>t.id===taskId);
    if(task){ task._replies = task._replies.filter(r=>r.id!==replyId); refreshReplies(task); }
    updateStats(allIssues);
    showToast('✓ 응답이 삭제되었습니다.');
  }catch(e){ showToast('삭제 실패: '+e.message,'error'); }
}

// ══════════════════════════════════════════════
// CONFIG
// ══════════════════════════════════════════════

function updateGhStatus(오케이){
  const el=document.getElementById('ghStatus');
  if(ok===null){ el.className='github-status disconnected'; el.textContent='● 연결중...'; return; }
  if(오케이){ el.className='github-status connected'; el.textContent='● GitHub 연결됨'; }
  else { el.className='github-status disconnected'; el.textContent='● GitHub 미연결'; }
}

// ══════════════════════════════════════════════
// FILTER / SEARCH / STATS
// ══════════════════════════════════════════════
function setFilter(f,el){
  currentFilter=f;
  document.querySelectorAll('.f-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  renderBoard();
}
function doSearch(val){ currentSearch=val; renderBoard(); }

function updateStats(tasks){
  tasks=tasks||allIssues;
  document.getElementById('sTotal').textContent=tasks.length;
  document.getElementById('sOngoing').textContent=tasks.filter(t=>t.status==='open').length;
  document.getElementById('sDone').textContent=tasks.filter(t=>t.status==='closed').length;
  document.getElementById('sReplies').textContent=tasks.reduce((s,t)=>s+(t._replies||[]).length,0);
}

// ══════════════════════════════════════════════
// UTILS
// ══════════════════════════════════════════════
function v(id){ const el=document.getElementById(id); return el?el.value:''; }
function esc(s){ if(!s)return''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function formatDate(d){
  if(!d)return''; const dt=new Date(d+'T00:00:00');
  return dt.toLocaleDateString('ko-KR',{year:'numeric',month:'2-digit',day:'2-digit',weekday:'short'});
}
function formatDt(iso){
  if(!iso)return''; const d=new Date(iso);
  return d.toLocaleString('ko-KR',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
}
function showToast(msg,type='ok'){
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='toast'+(type==='error'?' error':'');
  t.classList.add('show');
  clearTimeout(t._tid);
  t._tid=setTimeout(()=>t.classList.remove('show'),2800);
}

// ══════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════

// loadCfg 보완 — localStorage + sessionStorage 이중 저장
function loadCfg(){
  try{
    const ls = localStorage.getItem(CFG_KEY);
    const ss = sessionStorage.getItem(CFG_KEY);
    if(ls){ cfg = JSON.parse(ls); }
    else if(ss){ cfg = JSON.parse(ss); localStorage.setItem(CFG_KEY, ss); }
    else{ cfg = {}; }
  }catch{ cfg={}; }
}

// saveCfg 보완 — 두 곳에 저장
function saveCfg(){
  const s = JSON.stringify(cfg);
  try{ localStorage.setItem(CFG_KEY, s); }catch{}
  try{ sessionStorage.setItem(CFG_KEY, s); }catch{}
}

document.addEventListener('DOMContentLoaded',()=>{
  loadCfg();
  const today=new Date().toISOString().split('T')[0];
  document.getElementById('qDate').value=today;
  document.getElementById('mDate').value=today;
  updateStats([]);

  if(isConfigured()){
    updateGhStatus(null);
    loadIssues();
  } else {
    updateGhStatus(false);
    document.getElementById('boardList').innerHTML=
      `<div class="empty"><div class="empty-icon">🔗</div>
      <p>연결 정보가 없습니다.<br/>코드 상단 <strong>PRESET</strong> 항목을 확인해주세요.</p></div>`;
  }
});
</script>
